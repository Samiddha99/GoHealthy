<!DOCTYPE html>
{% extends 'base.html' %}
{%block project%}
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>First Aid - Photo</title>
</head>
<body style="background-image: url('{% static 'media/images/firstaid_photo_background.jfif' %}');
             background-size: cover;background-repeat:no-repeat;background-attachment:fixed">
<center>
    <div class="alert alert-success" role="alert"
         style="margin-bottom:1%;margin-right:1%;margin-left:1%;background-image:linear-gradient(white, Chartreuse)">
        <h2 class="alert-heading" style="color:blue;font-family:Comic Sans MS, Comic Sans, cursiv">Photo Tutorial</h2>
        <p class="mb-0" style="font-size:21px">Here some photos from which you can learn about first aid.</p>
    </div>

<form id="languageFilter" method="get">
<div class="row">
    <div class="col-md-6"></div>
    <div class="col-md-3 ml-2 mr-2" align="right">
        <select name="language" id="language" class="form-control" form="languageFilter" required style="width:95%">
            <option label="Select Language"></option>
            <option value="All Languages">All Languages</option>
            {% for i in languages %}
            <option value="{{i}}">{{i}}</option>
            {% endfor %}
        </select>
    </div>
</div>
<div class="row">
    <div class="col-md-9 ml-2 mr-2" align="right">
        <button type="submit" class="btn btn-success" form="languageFilter" name="action" value="filter" style="width:200px;margin-top:1px">Filter</button>
    </div>
    <div class="col-md"></div>
</div>
</form>
<br>
    <div class="row mx-auto">
        {%for i in Ph%}
        <div class="col-md-6" align="center">
            <center>
                <div class="card"
                     style="width:90%;margin-bottom:10%;padding:2%;background-image:linear-gradient(white, red)">
                    <div class="card-body">
                        <center>
                            <h4 class="card-title" style="margin-bottom:0.2%;margin-top:0.2%;color:blue">{{i.Name}}</h4>
                        </center>
                    </div>
                    <a href="{{i.Upload_Photo.url}}"> <img src="{{i.Upload_Photo.url}}" class="card-img-bottom" height="110%" alt="..."></a>
                </div>
            </center>
        </div>
        {%endfor%}
    </div>

</center>
</body>
</html>
{%endblock%}
